name: Final Build Attempt
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Force Build
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle
          gradle build --no-daemon || (echo "Build failed, checking logs..." && exit 1)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Raider-Mod-Finished
          path: build/libs/*.jar
          
